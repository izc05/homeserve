name: Patch PR11 demo imports

on:
  push:
    branches:
      - feature/demo-persistence-reports

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/demo-persistence-reports
      - name: Remove unused imports
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/features/work-orders/demo/PersistentWorkOrderDetailWorkspace.tsx')
          text = path.read_text()
          text = text.replace('  UserRound,\n  Wrench,\n', '')
          path.write_text(text)
          PY
      - name: Commit patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/features/work-orders/demo/PersistentWorkOrderDetailWorkspace.tsx
          git diff --cached --quiet || git commit -m "fix: retirar imports no utilizados del detalle demo"
          git push
