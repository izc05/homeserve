name: Quality

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        run: npm install

      - name: Typecheck diagnostic
        shell: bash
        run: |
          set +e
          npm run typecheck > typecheck.log 2>&1
          code=$?
          cat typecheck.log
          echo "TYPECHECK_EXIT=$code" >> "$GITHUB_ENV"
          exit 0

      - name: Upload typecheck diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-pr12
          path: typecheck.log

      - name: Preserve typecheck result
        run: test "$TYPECHECK_EXIT" = "0"

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
