name: One-time wire create form

on:
  push:
    branches:
      - feature/create-assign-work-orders

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feature/create-assign-work-orders
      - name: Wire component
        run: |
          python - <<'PY'
          from pathlib import Path

          app = Path('src/App.tsx')
          text = app.read_text()

          import_anchor = "import { getSupabaseClient } from './lib/supabase';\n"
          component_import = "import CreateWorkOrderForm from './features/work-orders/components/CreateWorkOrderForm';\n"
          if component_import not in text:
              if import_anchor not in text:
                  raise SystemExit('App import anchor not found')
              text = text.replace(import_anchor, import_anchor + component_import, 1)

          old_component = "function CreateOrder({ cancel }: { cancel: () => void }) {\n  return <section className=\"panel data-state read-only-screen\"><LockKeyhole size={34} /><span className=\"section-kicker\">Escritura protegida</span><h1>Creación de OT pendiente de validación</h1><p>El formulario visual está preparado, pero no se habilitará hasta revisar las RPC de creación, asignación y auditoría contra la base existente.</p><div className=\"source-checks\"><span><CheckCircle2 size={17} /> Lectura real activa</span><span><CheckCircle2 size={17} /> RLS respetado</span><span><Clock3 size={17} /> Escritura pendiente de pruebas SQL</span></div><button className=\"secondary-button\" onClick={cancel} type=\"button\"><ArrowLeft size={17} /> Volver a las órdenes</button></section>;\n}\n"
          new_component = "function CreateOrder({ tenantId, canManage, cancel, created }: { tenantId: string; canManage: boolean; cancel: () => void; created: () => void }) {\n  return <CreateWorkOrderForm tenantId={tenantId} canManage={canManage} onCancel={cancel} onCreated={created} />;\n}\n"
          if old_component not in text:
              raise SystemExit('CreateOrder placeholder not found')
          text = text.replace(old_component, new_component, 1)

          old_usage = "else if (view === 'create') content = <CreateOrder cancel={() => setView('orders')} />;"
          new_usage = "else if (view === 'create') content = <CreateOrder tenantId={tenantId} canManage={viewerRole === 'admin_cliente'} cancel={() => setView('orders')} created={() => setView('orders')} />;"
          if old_usage not in text:
              raise SystemExit('CreateOrder usage not found')
          text = text.replace(old_usage, new_usage, 1)

          app.write_text(text)
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/App.tsx
          git commit -m "feat: conectar formulario real de creación de OT"
          git push origin HEAD:feature/create-assign-work-orders
