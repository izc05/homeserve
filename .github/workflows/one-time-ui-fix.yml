name: One-time UI fix

on:
  push:
    branches:
      - feature/real-work-orders-ui

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feature/real-work-orders-ui
      - name: Remove unused callback argument
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/App.tsx')
          text = path.read_text()
          old = "technicians.map(([name, amount], index) =>"
          new = "technicians.map(([name, amount]) =>"
          if old not in text:
              raise SystemExit('Expected callback was not found')
          path.write_text(text.replace(old, new, 1))
          PY
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/App.tsx
          git commit -m "fix: eliminar argumento no utilizado del dashboard"
          git push origin HEAD:feature/real-work-orders-ui
