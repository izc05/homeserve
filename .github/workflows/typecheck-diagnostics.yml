name: Typecheck diagnostics

on:
  pull_request:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Capture typecheck
        run: npm run typecheck > typecheck.txt 2>&1 || true
      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics-ui
          path: typecheck.txt
