name: Typecheck diagnostics

on:
  pull_request:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        run: npm install

      - name: Capture typecheck
        shell: bash
        run: |
          set +e
          npm run typecheck > typecheck.log 2>&1
          echo $? > typecheck.exit
          set -e

      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: |
            typecheck.log
            typecheck.exit
