name: Typecheck diagnostic PR12

on:
  push:
    branches:
      - feature/demo-technician-execution

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Capture TypeScript output
        shell: bash
        run: |
          set +e
          npm run typecheck > typecheck.log 2>&1
          code=$?
          cat typecheck.log
          echo "exit_code=$code" >> "$GITHUB_ENV"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: typecheck-pr12
          path: typecheck.log
      - name: Preserve failure state
        run: test "${{ env.exit_code }}" = "0"
