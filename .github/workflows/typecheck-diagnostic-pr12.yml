name: Typecheck diagnostic PR12

on:
  push:
    branches:
      - feature/demo-technician-execution

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/demo-technician-execution
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Capture TypeScript output
        shell: bash
        run: |
          mkdir -p diagnostics
          set +e
          npm run typecheck > diagnostics/typecheck-pr12.log 2>&1
          cat diagnostics/typecheck-pr12.log
          exit 0
      - name: Commit diagnostic
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add diagnostics/typecheck-pr12.log
          git diff --cached --quiet || git commit -m "ci: guardar diagnóstico temporal de TypeScript PR12"
          git push
