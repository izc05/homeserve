name: One-time wire demo mode

on:
  push:
    branches:
      - feature/demo-mode-ui

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feature/demo-mode-ui

      - name: Wire demo mode
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          app = Path('src/App.tsx')
          text = app.read_text()

          import_anchor = "import { getSupabaseClient } from './lib/supabase';\n"
          imports = (
              "import DemoCreateWorkOrder from './features/work-orders/demo/DemoCreateWorkOrder';\n"
              "import WorkOrderDetailWorkspace from './features/work-orders/demo/WorkOrderDetailWorkspace';\n"
              "import { demoWorkOrders } from './features/work-orders/demo/demoWorkOrders';\n"
          )
          if imports not in text:
              if import_anchor not in text:
                  raise SystemExit('App import anchor not found')
              text = text.replace(import_anchor, import_anchor + imports, 1)

          props_anchor = "  onLogout: () => void;\n};"
          props_replacement = "  onLogout: () => void;\n  dataMode?: 'supabase' | 'demo';\n};"
          if props_replacement not in text:
              if props_anchor not in text:
                  raise SystemExit('AppProps anchor not found')
              text = text.replace(props_anchor, props_replacement, 1)

          text = text.replace('<span className="source-badge">Datos reales</span>', '<span className="source-badge">Fuente activa</span>')
          text = text.replace('Resumen real de las órdenes visibles para tu cuenta.', 'Resumen de las órdenes disponibles para tu cuenta.')
          text = text.replace('Supabase como fuente oficial', 'Capa de datos activa')
          text = text.replace('Permisos aplicados por RLS', 'Permisos aplicados por perfil')
          text = text.replace('Sin datos de demostración', 'Datos adaptados al entorno activo')
          text = text.replace('{filtered.length} órdenes visibles mediante RLS.', '{filtered.length} órdenes disponibles para tu perfil.')
          text = text.replace('Planificación real', 'Planificación operativa')
          text = text.replace('Órdenes con fecha prevista para la organización activa.', 'Órdenes con fecha prevista para la organización seleccionada.')
          text = text.replace('Zona técnico real', 'Zona técnico')
          text = text.replace('Esta vista utiliza el usuario autenticado y las mismas políticas RLS de Supabase.', 'Esta vista utiliza el usuario actual y muestra únicamente sus órdenes asignadas.')

          detail_pattern = re.compile(r"function Detail\(\{ order, back \}: \{ order: WorkOrderListItem \| null; back: \(\) => void \}\) \{.*?\n\}\n\nfunction CreateOrder", re.S)
          detail_replacement = """function Detail({
  order,
  back,
  viewerRole,
  demoMode,
  updateDemoOrder,
}: {
  order: WorkOrderListItem | null;
  back: () => void;
  viewerRole: string;
  demoMode: boolean;
  updateDemoOrder: (orderId: string, changes: Partial<WorkOrderListItem>) => void;
}) {
  return <WorkOrderDetailWorkspace order={order} viewerRole={viewerRole} demoMode={demoMode} onBack={back} onDemoUpdate={updateDemoOrder} />;
}

function CreateOrder"""
          text, count = detail_pattern.subn(detail_replacement, text, count=1)
          if count != 1:
              raise SystemExit(f'Detail replacement count: {count}')

          create_pattern = re.compile(r"function CreateOrder\(\{ cancel \}: \{ cancel: \(\) => void \}\) \{.*?\n\}\n\nfunction Planning", re.S)
          create_replacement = """function CreateOrder({
  cancel,
  demoMode,
  tenantId,
  orders,
  createDemoOrder,
}: {
  cancel: () => void;
  demoMode: boolean;
  tenantId: string;
  orders: WorkOrderListItem[];
  createDemoOrder: (order: WorkOrderListItem) => void;
}) {
  if (demoMode) return <DemoCreateWorkOrder tenantId={tenantId} orders={orders} onCancel={cancel} onCreate={createDemoOrder} />;
  return <section className="panel data-state read-only-screen"><LockKeyhole size={34} /><span className="section-kicker">Escritura protegida</span><h1>Creación de OT pendiente de validación</h1><p>El formulario visual está preparado, pero no se habilitará hasta revisar las RPC de creación, asignación y auditoría contra la base existente.</p><div className="source-checks"><span><CheckCircle2 size={17} /> Lectura real activa</span><span><CheckCircle2 size={17} /> RLS respetado</span><span><Clock3 size={17} /> Escritura pendiente de pruebas SQL</span></div><button className="secondary-button" onClick={cancel} type="button"><ArrowLeft size={17} /> Volver a las órdenes</button></section>;
}

function Planning"""
          text, count = create_pattern.subn(create_replacement, text, count=1)
          if count != 1:
              raise SystemExit(f'CreateOrder replacement count: {count}')

          destructure_anchor = "  viewerRole,\n  onLogout,\n}: AppProps) {"
          destructure_replacement = "  viewerRole,\n  onLogout,\n  dataMode = 'supabase',\n}: AppProps) {"
          if destructure_replacement not in text:
              if destructure_anchor not in text:
                  raise SystemExit('App destructure anchor not found')
              text = text.replace(destructure_anchor, destructure_replacement, 1)

          state_anchor = "  const [selectedOrderId, setSelectedOrderId] = useState('');\n  const query = useQuery({"
          state_replacement = "  const [selectedOrderId, setSelectedOrderId] = useState('');\n  const [localDemoOrders, setLocalDemoOrders] = useState<WorkOrderListItem[]>(() => demoWorkOrders);\n  const demoMode = dataMode === 'demo';\n  const query = useQuery({"
          if state_replacement not in text:
              if state_anchor not in text:
                  raise SystemExit('App state anchor not found')
              text = text.replace(state_anchor, state_replacement, 1)

          text = text.replace("    queryKey: ['work-orders', tenantId],", "    queryKey: ['work-orders', tenantId, dataMode],", 1)
          text = text.replace("    enabled: Boolean(tenantId),", "    enabled: !demoMode && Boolean(tenantId),", 1)
          text = text.replace("  const orders = query.data ?? [];", "  const orders = demoMode ? localDemoOrders : query.data ?? [];", 1)

          helper_anchor = "  const openDetail = (id: string) => { setSelectedOrderId(id); setView('detail'); };\n\n  let content;"
          helper_replacement = """  const openDetail = (id: string) => { setSelectedOrderId(id); setView('detail'); };
  const updateDemoOrder = (orderId: string, changes: Partial<WorkOrderListItem>) => {
    setLocalDemoOrders((current) => current.map((order) => order.id === orderId ? { ...order, ...changes } : order));
  };
  const createDemoOrder = (order: WorkOrderListItem) => {
    setLocalDemoOrders((current) => [order, ...current]);
    setSelectedOrderId(order.id);
    setView('detail');
  };

  let content;"""
          if helper_replacement not in text:
              if helper_anchor not in text:
                  raise SystemExit('App helper anchor not found')
              text = text.replace(helper_anchor, helper_replacement, 1)

          text = text.replace("  if (query.isLoading) content = <LoadingOrders />;", "  if (!demoMode && query.isLoading) content = <LoadingOrders />;", 1)
          text = text.replace("  else if (query.error) content = <OrdersError message={query.error.message} retry={() => void query.refetch()} />;", "  else if (!demoMode && query.error) content = <OrdersError message={query.error.message} retry={() => void query.refetch()} />;", 1)
          text = text.replace("  else if (view === 'detail') content = <Detail order={selectedOrder} back={() => setView('orders')} />;", "  else if (view === 'detail') content = <Detail order={selectedOrder} back={() => setView('orders')} viewerRole={viewerRole} demoMode={demoMode} updateDemoOrder={updateDemoOrder} />;", 1)
          text = text.replace("  else if (view === 'create') content = <CreateOrder cancel={() => setView('orders')} />;", "  else if (view === 'create') content = <CreateOrder cancel={() => setView('orders')} demoMode={demoMode} tenantId={tenantId} orders={orders} createDemoOrder={createDemoOrder} />;", 1)

          main_anchor = '<div className="app-workspace"><Topbar viewerName={viewerName} viewerRole={viewerRole} menu={() => setMenuOpen(true)} create={() => setView(\'create\')} /><main className="main-content">{content}</main></div>'
          main_replacement = '<div className="app-workspace"><Topbar viewerName={viewerName} viewerRole={viewerRole} menu={() => setMenuOpen(true)} create={() => setView(\'create\')} /><main className="main-content">{demoMode && <div className="demo-context-banner"><ShieldCheck size={17} /><span><strong>Modo demo:</strong> datos ficticios y cambios temporales en este navegador.</span></div>}{content}</main></div>'
          if main_replacement not in text:
              if main_anchor not in text:
                  raise SystemExit('App main anchor not found')
              text = text.replace(main_anchor, main_replacement, 1)

          app.write_text(text)

          auth = Path('src/AuthApp.tsx')
          text = auth.read_text()
          auth_import_anchor = "import App from './App';\n"
          auth_imports = "import DemoAccessPanel, { type DemoRole } from './features/demo/DemoAccessPanel';\n"
          if auth_imports not in text:
              if auth_import_anchor not in text:
                  raise SystemExit('Auth import anchor not found')
              text = text.replace(auth_import_anchor, auth_import_anchor + auth_imports, 1)

          config_pattern = re.compile(r"function ConfigurationScreen\(\) \{.*?\n\}", re.S)
          config_replacement = """function ConfigurationScreen({ onDemo }: { onDemo: (role: DemoRole) => void }) {
  return <DemoAccessPanel onStart={onDemo} />;
}"""
          text, count = config_pattern.subn(config_replacement, text, count=1)
          if count != 1:
              raise SystemExit(f'ConfigurationScreen replacement count: {count}')

          demo_state_anchor = "  const [recoveryMode, setRecoveryMode] = useState(false);\n"
          demo_state_replacement = "  const [recoveryMode, setRecoveryMode] = useState(false);\n  const [demoRole, setDemoRole] = useState<DemoRole | null>(null);\n"
          if demo_state_replacement not in text:
              if demo_state_anchor not in text:
                  raise SystemExit('Demo state anchor not found')
              text = text.replace(demo_state_anchor, demo_state_replacement, 1)

          render_anchor = "  if (loading) return <LoadingScreen />;\n  if (!isSupabaseConfigured) return <ConfigurationScreen />;"
          render_replacement = """  if (loading) return <LoadingScreen />;
  if (demoRole) {
    const demoNames: Record<DemoRole, string> = {
      admin_cliente: 'Isi Administrador',
      coordinador: 'Isi Coordinador',
      tecnico: 'Carlos Martínez',
      cliente_lectura: 'Usuario Consulta',
    };
    const demoViewerId = demoRole === 'tecnico' ? 'demo-tech-1' : `demo-${demoRole}`;
    return <div className="authenticated-root"><App tenantId="demo-hospital" tenantName="Hospital Universitario PTS · Demo" viewerId={demoViewerId} viewerName={demoNames[demoRole]} viewerRole={demoRole} dataMode="demo" onLogout={() => setDemoRole(null)} /></div>;
  }
  if (!isSupabaseConfigured) return <ConfigurationScreen onDemo={setDemoRole} />;"""
          if render_replacement not in text:
              if render_anchor not in text:
                  raise SystemExit('Auth render anchor not found')
              text = text.replace(render_anchor, render_replacement, 1)

          auth.write_text(text)

          main = Path('src/main.tsx')
          text = main.read_text()
          css_anchor = "import './styles/real-data.css';\n"
          css_import = "import './styles/demo-mode.css';\n"
          if css_import not in text:
              if css_anchor not in text:
                  raise SystemExit('Main CSS anchor not found')
              text = text.replace(css_anchor, css_anchor + css_import, 1)
          main.write_text(text)
          PY

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/App.tsx src/AuthApp.tsx src/main.tsx
          git commit -m "feat: conectar modo demo sin Supabase"
          git push origin HEAD:feature/demo-mode-ui
