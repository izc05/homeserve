name: Patch PR12 unused import

on:
  push:
    branches:
      - feature/demo-technician-execution

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/demo-technician-execution
      - name: Remove unused import
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/features/work-orders/demo/PersistentWorkOrderDetailWorkspace.tsx')
          text = path.read_text().replace('  ClipboardCheck,\n', '')
          path.write_text(text)
          PY
      - name: Commit patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/features/work-orders/demo/PersistentWorkOrderDetailWorkspace.tsx
          git diff --cached --quiet || git commit -m "fix: retirar import no utilizado del detalle técnico"
          git push
