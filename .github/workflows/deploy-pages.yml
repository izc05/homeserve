name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build and upload site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Validate public environment
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: |
          set -euo pipefail

          if [[ -z "${VITE_SUPABASE_URL:-}" ]]; then
            echo "::error::Falta la variable de Actions VITE_SUPABASE_URL."
            exit 1
          fi

          if [[ ! "$VITE_SUPABASE_URL" =~ ^https://[a-z0-9]{20}\.supabase\.co/?$ ]]; then
            echo "::error::VITE_SUPABASE_URL debe ser una URL HTTPS válida de un proyecto Supabase."
            exit 1
          fi

          if [[ -z "${VITE_SUPABASE_PUBLISHABLE_KEY:-}" ]]; then
            echo "::error::Falta el secret de Actions VITE_SUPABASE_PUBLISHABLE_KEY."
            exit 1
          fi

          normalized_key="${VITE_SUPABASE_PUBLISHABLE_KEY,,}"
          if [[ "$normalized_key" == *service_role* ]] \
            || [[ "$VITE_SUPABASE_PUBLISHABLE_KEY" == sb_secret_* ]] \
            || [[ "$VITE_SUPABASE_PUBLISHABLE_KEY" == eyJ* ]]; then
            echo "::error::La clave configurada tiene apariencia de credencial de servidor o clave heredada."
            exit 1
          fi

          if [[ ! "$VITE_SUPABASE_PUBLISHABLE_KEY" =~ ^sb_publishable_[A-Za-z0-9_-]{16,}$ ]]; then
            echo "::error::La clave debe tener formato sb_publishable_."
            exit 1
          fi

          echo "Configuración pública validada sin mostrar valores."

      - name: Build public site
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
